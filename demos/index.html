<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interactive browser demos for Yuankai (William) He's autonomous mobility systems projects.">
    <meta name="theme-color" content="#f7f7f2">
    <title>Project Demo | Yuankai (William) He</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="demo.css?v=20260617-demos">
  </head>
  <body>
    <header class="demo-header">
      <a class="demo-brand" href="../#projects">Yuankai (William) He</a>
      <nav class="demo-nav" aria-label="Demo projects">
        <button class="demo-nav-button" type="button" data-demo-nav="davos">DAVOS</button>
        <button class="demo-nav-button" type="button" data-demo-nav="ipi">IPI</button>
        <button class="demo-nav-button" type="button" data-demo-nav="carscenes">CARScenes</button>
        <button class="demo-nav-button" type="button" data-demo-nav="dt-world">DT_World</button>
        <button class="demo-nav-button" type="button" data-demo-nav="blueice">BlueICE</button>
        <button class="demo-nav-button" type="button" data-demo-nav="icat">ICAT</button>
        <button class="demo-nav-button" type="button" data-demo-nav="startaxi">STARTaxi</button>
      </nav>
      <a class="back-link" href="../#projects">Projects</a>
    </header>

    <main class="demo-shell">
      <section class="demo-intro" aria-labelledby="demo-title">
        <p class="eyebrow" data-demo-kicker>Interactive replay</p>
        <h1 id="demo-title" data-demo-title></h1>
        <p data-demo-summary></p>
      </section>

      <section class="demo-workbench" aria-label="Interactive demo workbench">
        <aside class="control-panel">
          <h2>Controls</h2>
          <div class="scenario-list" data-scenarios></div>
          <button class="run-button" type="button" data-run-trace>Run trace</button>
        </aside>

        <div class="visual-panel">
          <div class="visual-stage" data-visual></div>
          <div class="timeline">
            <label for="trace-position">Trace position</label>
            <input id="trace-position" type="range" min="0" max="100" value="0" data-timeline>
          </div>
        </div>

        <aside class="output-panel">
          <h2>System output</h2>
          <dl class="metric-grid" data-metrics></dl>
          <div class="event-log" data-events></div>
        </aside>
      </section>
    </main>

    <script src="demo.js?v=20260617-demos" defer></script>
  </body>
</html>
